<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKU Attendance | Sora</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #FFFDF5; --baby-pink: #FFD1DC; --deep-pink: #FF91A4; --text: #5D5D5D; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cream); background-image: radial-gradient(circle at top right, var(--baby-pink), transparent), radial-gradient(circle at bottom left, var(--baby-pink), transparent); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3); width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.5); }
        h2 { font-weight: 600; color: var(--deep-pink); margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; margin-bottom: 25px; opacity: 0.7; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.75rem; font-weight: 600; margin-left: 10px; color: var(--deep-pink); }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid var(--baby-pink); border-radius: 15px; background: white; font-family: inherit; font-size: 1rem; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; margin-top: 20px; border: none; border-radius: 15px; background: linear-gradient(135deg, var(--baby-pink), var(--deep-pink)); color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 145, 164, 0.3); }
        button:hover { transform: translateY(-2px); }
        #msg { margin-top: 20px; font-weight: 600; font-size: 0.9rem; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>LKU Attendance</h2>
    <p class="subtitle">Limkokwing University • Sora ✨</p>
    <div class="input-group"><label>Full Name</label><input type="text" id="name" placeholder="Name"></div>
    <div class="input-group">
        <label>Class</label>
        <select id="subject">
            <option disabled selected>Pick class</option>
            <option>Major Project 2</option><option>Intro to IT</option>
            <option>Computer Application</option><option>Wordpress Website</option>
            <option>Major Project 1</option>
        </select>
    </div>
    <div class="input-group"><label>Week</label><select id="week"><script>for(let i=1; i<=17; i++) document.write("<option value='"+i+"'>Week "+i+"</option>");</script></select></div>
    <button onclick="submitAttendance()">CLOCK IN NOW</button>
    <p id="msg"></p>
</div>

<script>
    const SCRIPT_URL = "PASTE_YOUR_NEW_EXEC_URL_HERE"; 

    function submitAttendance() {
        const name = document.getElementById('name').value;
        const subject = document.getElementById('subject').value;
        const week = document.getElementById('week').value;
        const msg = document.getElementById('msg');

        if (!name || subject === "Pick class") {
            msg.style.color = "#FF6B6B";
            msg.innerText = "Please fill in all fields! 💕";
            return;
        }

        msg.style.color = "#888";
        msg.innerText = "Verifying Location... 📍";

        navigator.geolocation.getCurrentPosition(function(pos) {
            const data = {
                name: name, subject: subject, week: week,
                lat: pos.coords.latitude, lng: pos.coords.longitude
            };

            // Using GET method to bypass CORS and get a real response
            const finalUrl = SCRIPT_URL + "?data=" + encodeURIComponent(JSON.stringify(data));

            fetch(finalUrl)
            .then(res => res.json())
            .then(res => {
                msg.innerText = res.message;
                msg.style.color = (res.status === "SUCCESS") ? "#7BC67E" : "#FF6B6B";
                if(res.status === "SUCCESS") document.getElementById('name').value = "";
            })
            .catch(() => {
                msg.innerText = "Connection error. Ensure your link is correct!";
                msg.style.color = "#FF6B6B";
            });

        }, function() {
            msg.style.color = "#FF6B6B";
            msg.innerText = "❌ Please enable GPS to verify you're in class!";
        });
    }
</script>
</body>
</html>
