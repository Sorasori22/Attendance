<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Attendance Check-in</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    h2 { margin-top: 0; color: #333; text-align: center; }
    .timer-box { background: #eef2f7; border-left: 5px solid #007bff; padding: 10px; margin-bottom: 20px; border-radius: 4px; font-weight: bold; text-align: center; font-size: 1.1em; color: #2c3e50; }
    label { font-weight: 600; display: block; margin-bottom: 5px; color: #555; }
    input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; background: #007bff; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { text-align: center; font-weight: bold; margin-top: 15px; font-size: 15px; }
    .loading { color: #666; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
    iframe { display: none; } /* Hidden iframe to catch Google's redirection safely */
  </style>
</head>
<body>

<div class="card" id="formContainer">
  <h2>Class Attendance</h2>
  <div id="timerDisplay" class="timer-box">Connecting to sheet backend...</div>
  
  <!-- Form targets the hidden iframe to prevent redirection page break errors -->
  <form id="attendanceForm" action="https://script.google.com/macros/s/AKfycbxqZ3aADg0gTP2XmXZJ8K04VKKZSmuadQLc4Ofv4EQJt0XtRpMdKH0XDcsHNycFBMDjjw/exec" method="POST" target="hidden_iframe" style="display: none;">
    <label for="name">Full Name</label>
    <input type="text" name="name" id="name" placeholder="Enter your full name" required>

    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" placeholder="username@student.edu" required>

    <label for="major">Select Your Major</label>
    <select name="major" id="major" required>
      <option value="" disabled selected>-- Choose your Major --</option>
      <option value="Information Technology">Information Technology</option>
      <option value="Computer Science">Computer Science</option>
      <option value="Creative Multimedia">Creative Multimedia</option>
      <option value="Business Administration">Business Administration</option>
    </select>

    <input type="hidden" name="location" id="location" value="Unknown Location">
    <button type="submit" id="submitBtn" disabled>Fetching location...</button>
  </form>
  <div id="statusMessage" class="status"></div>
</div>

<!-- Hidden Iframe Trick handles CORS redirect nicely -->
<iframe name="hidden_iframe" id="hidden_iframe"></iframe>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzBb9qb_Ka4OkjNDWWtpGdiRWqTeciBmaGyY6YNRCrNq9INi48nqfLthz4fazrsAnADng/exec"; 
  
  let totalSeconds = 0;
  let timerInterval;
  let formSubmitted = false;

  // Sync Timer status from the Live Script URL
  fetch(WEB_APP_URL)
    .then(response => {
      if (!response.ok) throw new Error("Network status response error");
      return response.json();
    })
    .then(data => {
      if (data.status !== "ON") {
        showClosedMessage();
      } else {
        totalSeconds = data.elapsedSeconds;
        document.getElementById("attendanceForm").style.display = "block";
        timerInterval = setInterval(updateTimerDisplay, 1000);
        getLocation();
      }
    })
    .catch(err => {
      document.getElementById("timerDisplay").style.backgroundColor = "#f8d7da";
      document.getElementById("timerDisplay").style.borderLeftColor = "#dc3545";
      document.getElementById("timerDisplay").innerText = "Connection error to Google Sheet. Check if App Script is deployed properly as 'Anyone'.";
      console.error(err);
    });

  function showClosedMessage() {
    document.getElementById("timerDisplay").style.backgroundColor = "#f8d7da";
    document.getElementById("timerDisplay").style.borderLeftColor = "#dc3545";
    document.getElementById("timerDisplay").innerText = "The attendance session is currently CLOSED.";
  }

  function updateTimerDisplay() {
    totalSeconds++;
    let mins = Math.floor(totalSeconds / 60);
    let secs = totalSeconds % 60;
    let formattedTime = String(mins).padStart(2, '0') + ":" + String(secs).padStart(2, '0');
    
    let rulesText = " (Present)";
    if (totalSeconds >= 1801) rulesText = " (Absent - Session Expired)";
    else if (totalSeconds >= 901) rulesText = " (Late)";
    
    document.getElementById("timerDisplay").innerText = "Elapsed Time: " + formattedTime + rulesText;
  }

  function getLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          let lat = position.coords.latitude.toFixed(5);
          let lon = position.coords.longitude.toFixed(5);
          document.getElementById("location").value = `Lat: ${lat}, Lon: ${lon}`;
          enableForm();
        },
        (error) => {
          document.getElementById("location").value = "Location Permission Denied";
          enableForm();
        }
      );
    } else {
      document.getElementById("location").value = "Geolocation Not Supported";
      enableForm();
    }
  }

  function enableForm() {
    let btn = document.getElementById("submitBtn");
    btn.disabled = false;
    btn.innerText = "Submit Attendance";
  }

  // Intercept the form submission visual state
  document.getElementById("attendanceForm").addEventListener("submit", function(e) {
    let btn = document.getElementById("submitBtn");
    let msg = document.getElementById("statusMessage");
    
    btn.disabled = true;
    msg.className = "status loading";
    msg.innerText = "Submitting attendance to sheet, please wait...";
    formSubmitted = true; 
  });

  // Check the hidden iframe loading status to confirm submission success
  document.getElementById("hidden_iframe").addEventListener("load", function() {
    if (formSubmitted) {
      let msg = document.getElementById("statusMessage");
      msg.className = "status success";
      msg.innerText = "Attendance recorded successfully! Check with your lecturer.";
      document.getElementById("attendanceForm").reset();
      clearInterval(timerInterval);
      document.getElementById("timerDisplay").style.display = "none";
      document.getElementById("attendanceForm").style.display = "none";
    }
  });
</script>

</body>
</html>
