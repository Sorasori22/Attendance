<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKU Attendance | Sora</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #FFFDF5; --baby-pink: #FFD1DC; --deep-pink: #FF91A4; --text: #5D5D5D; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cream); background-image: radial-gradient(circle at top right, var(--baby-pink), transparent), radial-gradient(circle at bottom left, var(--baby-pink), transparent); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3); width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.5); }
        h2 { font-weight: 600; color: var(--deep-pink); margin-top: 0; }
        .input-group { margin-bottom: 12px; text-align: left; }
        label { font-size: 0.75rem; font-weight: 600; margin-left: 10px; color: var(--deep-pink); }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid var(--baby-pink); border-radius: 15px; background: white; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--deep-pink); }
        button { width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 15px; background: linear-gradient(135deg, var(--baby-pink), var(--deep-pink)); color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 145, 164, 0.3); }
        #msg { margin-top: 15px; font-weight: 600; font-size: 0.85rem; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>LKU Attendance</h2>
    <p style="font-size:0.8rem; margin-bottom:20px; opacity:0.7;">Please enter your details carefully ✨</p>
    
    <div class="input-group"><label>Full Name</label><input type="text" id="name" placeholder="As per ID"></div>
    <div class="input-group"><label>Google/School Email</label><input type="email" id="email" placeholder="example@gmail.com"></div>
    
    <div class="input-group">
        <label>Subject</label>
        <select id="subject">
            <option disabled selected>Pick class</option>
            <option>Major Project 2</option><option>Intro to IT</option>
            <option>Computer Application</option><option>Wordpress Website</option>
            <option>Major Project 1</option>
        </select>
    </div>
    
    <div class="input-group"><label>Week</label><select id="week"><script>for(let i=1; i<=17; i++) document.write("<option value='"+i+"'>Week "+i+"</option>");</script></select></div>
    
    <button onclick="submitAttendance()">CLOCK IN NOW</button>
    <p id="msg"></p>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjZCsOUeRc88xEU8_ssyJKUR-jTcs6v5AuamF4pwI8favUbRWxa6g1Vls9AOdO_zXB/exec";

    function handleResponse(res) {
        const msg = document.getElementById('msg');
        msg.innerText = res.message;
        msg.style.color = (res.status === "SUCCESS") ? "#7BC67E" : "#FF6B6B";
        if(res.status === "SUCCESS") {
            document.getElementById('name').value = "";
            document.getElementById('email').value = "";
        }
        const oldScript = document.getElementById('jsonp-script');
        if (oldScript) oldScript.remove();
    }

    function submitAttendance() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const subject = document.getElementById('subject').value;
        const week = document.getElementById('week').value;
        const msg = document.getElementById('msg');

        if (!name || !email || subject === "Pick class") {
            msg.style.color = "#FF6B6B";
            msg.innerText = "Please fill in all fields! 💕";
            return;
        }

        msg.style.color = "#888";
        msg.innerText = "Verifying GPS... 📍";

        navigator.geolocation.getCurrentPosition(function(pos) {
            const data = {
                name: name, email: email, subject: subject, week: week,
                lat: pos.coords.latitude, lng: pos.coords.longitude
            };

            const finalUrl = SCRIPT_URL + "?callback=handleResponse&data=" + encodeURIComponent(JSON.stringify(data));
            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = finalUrl;
            document.body.appendChild(script);

        }, function() {
            msg.style.color = "#FF6B6B";
            msg.innerText = "❌ Please enable GPS!";
        });
    }
</script>
</body>
</html>
