<!DOCTYPE html>
<html>
<head>
    <title>LKU Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; max-width: 350px; margin: auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { background: #E6007E; color: white; border: none; width: 100%; padding: 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>LKU Attendance</h2>
        <input type="text" id="name" placeholder="Full Name">
        <select id="subject">
            <option>Major Project 1</option>
            <option>Intro to IT</option>
            <option>Computer Application</option>
        </select>
        <select id="week">
            <option>Week 1</option><option>Week 2</option>
        </select>
        <button onclick="submitData()">CLOCK IN</button>
        <p id="msg"></p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz47eGYxHGJq-ihEopQmZpnAxQfyZ6f6_keF0qw69PBZdSUZQ4Mni9w0IByOSjXKVYP/exec"; // PASTE YOUR URL HERE

        function submitData() {
            const data = {
                name: document.getElementById('name').value,
                subject: document.getElementById('subject').value,
                week: document.getElementById('week').value
            };
            
            document.getElementById('msg').innerText = "Sending...";

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                document.getElementById('msg').innerText = res.message;
            })
            .catch(err => {
                document.getElementById('msg').innerText = "Error: Check internet/GPS";
            });
        }
    </script>
</body>
</html>
