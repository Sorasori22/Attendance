<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Attendance Check-in</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    h2 { margin-top: 0; color: #333; text-align: center; }
    .timer-box { background: #eef2f7; border-left: 5px solid #007bff; padding: 10px; margin-bottom: 20px; border-radius: 4px; font-weight: bold; text-align: center; font-size: 1.1em; color: #2c3e50; }
    label { font-weight: 600; display: block; margin-bottom: 5px; color: #555; }
    input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; background: #007bff; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { text-align: center; font-weight: bold; margin-top: 15px; font-size: 15px; }
    .loading { color: #666; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
  </style>
</head>
<body>

<div class="card" id="formContainer">
  <h2>Class Attendance</h2>
  <div id="timerDisplay" class="timer-box">Connecting to sheet backend...</div>
  
  <form id="attendanceForm" style="display: none;">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="username@student.edu" required>

    <label for="major">Select Your Major</label>
    <select id="major" required>
      <option value="" disabled selected>-- Choose your Major --</option>
      <option value="Information Technology">Information Technology</option>
      <option value="Computer Science">Computer Science</option>
      <option value="Creative Multimedia">Creative Multimedia</option>
      <option value="Business Administration">Business Administration</option>
    </select>

    <input type="hidden" id="location" value="Unknown Location">
    <button type="submit" id="submitBtn" disabled>Fetching location...</button>
  </form>
  <div id="statusMessage" class="status"></div>
</div>

<script>
  // Pinned API Configuration
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxqZ3aADg0gTP2XmXZJ8K04VKKZSmuadQLc4Ofv4EQJt0XtRpMdKH0XDcsHNycFBMDjjw/exec"; 
  
  let totalSeconds = 0;
  let timerInterval;

  // Initialize System state from your spreadsheet live settings
  fetch(WEB_APP_URL)
    .then(response => response.json())
    .then(data => {
      if (data.status !== "ON") {
        document.getElementById("timerDisplay").style.backgroundColor = "#f8d7da";
        document.getElementById("timerDisplay").style.borderLeftColor = "#dc3545";
        document.getElementById("timerDisplay").innerText = "The attendance session is currently CLOSED.";
      } else {
        totalSeconds = data.elapsedSeconds;
        document.getElementById("attendanceForm").style.display = "block";
        timerInterval = setInterval(updateTimerDisplay, 1000);
        getLocation();
      }
    })
    .catch(err => {
      document.getElementById("timerDisplay").innerText = "Connection error to Google Sheet.";
      console.error(err);
    });

  function updateTimerDisplay() {
    totalSeconds++;
    let mins = Math.floor(totalSeconds / 60);
    let secs = totalSeconds % 60;
    let formattedTime = String(mins).padStart(2, '0') + ":" + String(secs).padStart(2, '0');
    
    let rulesText = " (Present)";
    if (totalSeconds >= 1801) rulesText = " (Absent - Late Expired)";
    else if (totalSeconds >= 901) rulesText = " (Late)";
    
    document.getElementById("timerDisplay").innerText = "Elapsed Time: " + formattedTime + rulesText;
  }

  function getLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          let lat = position.coords.latitude.toFixed(5);
          let lon = position.coords.longitude.toFixed(5);
          document.getElementById("location").value = `Lat: ${lat}, Lon: ${lon}`;
          enableForm();
        },
        (error) => {
          document.getElementById("location").value = "Location Permission Denied";
          enableForm();
        }
      );
    } else {
      document.getElementById("location").value = "Geolocation Not Supported";
      enableForm();
    }
  }

  function enableForm() {
    let btn = document.getElementById("submitBtn");
    btn.disabled = false;
    btn.innerText = "Submit Attendance";
  }

  document.getElementById("attendanceForm").addEventListener("submit", function(e) {
    e.preventDefault();
    let btn = document.getElementById("submitBtn");
    let msg = document.getElementById("statusMessage");
    
    btn.disabled = true;
    msg.className = "status loading";
    msg.innerText = "Submitting, please wait...";

    let formData = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      major: document.getElementById("major").value,
      location: document.getElementById("location").value
    };

    // Post to Apps Script Web App without cross-origin login blocks
    fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors", // Bypasses browser cross-domain restriction policies completely
      cache: "no-cache",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(formData)
    })
    .then(() => {
      msg.className = "status success";
      msg.innerText = "Attendance submitted successfully! Check your status on the lecture sheet.";
      document.getElementById("attendanceForm").reset();
      clearInterval(timerInterval);
      document.getElementById("timerDisplay").style.display = "none";
    })
    .catch(error => {
      msg.className = "status error";
      msg.innerText = "Submission Error. Try again.";
      btn.disabled = false;
      console.error(error);
    });
  });
</script>

</body>
</html>
